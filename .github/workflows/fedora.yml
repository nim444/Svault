name: fedora

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: fedora-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fedora:
    # GitHub has no hosted Fedora runner — run inside a Fedora container
    # on the Ubuntu runner instead.
    uses: ./.github/workflows/test.yml
    with:
      os: ubuntu-latest
      container: fedora:latest
