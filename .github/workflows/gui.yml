name: gui

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: gui-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (frontend + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Tauri's Linux runtime/build dependencies.
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev pkg-config libudev-dev

      - name: Frontend build
        working-directory: gui
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Backend fmt
        working-directory: gui/src-tauri
        run: cargo fmt --all --check

      - name: Backend clippy
        working-directory: gui/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Backend build
        working-directory: gui/src-tauri
        run: cargo build

  # Release bundles (.dmg / .msi / .AppImage) are produced by the standard
  # tauri-action across the four targets. Kept commented until 2.0.0 tagging so
  # CI stays fast on every push.
